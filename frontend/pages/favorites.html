<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08040f">
    <title>Buga | Mi Lista</title>
    <link rel="stylesheet" href="/css/favorites.css">
</head>
<body class="is-loading favorites-page">
    <div class="page-loader" id="pageLoader" aria-live="polite" aria-label="Cargando contenido">
        <div class="page-loader-card">
            <div class="page-loader-spinner" aria-hidden="true"></div>
            <p>Cargando tu lista…</p>
        </div>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <div class="header-top">
                <a class="brand-area" href="/index.html" aria-label="Ir al inicio de Buga">
                    <img class="brand-logo" src="/assets/images/logo-buga.png" alt="Logo BUGA">
                </a>

                <div class="header-actions">
                    <button class="menu-toggle" type="button" aria-controls="primaryNav" aria-expanded="false" aria-label="Abrir menú">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    <button class="profile-chip" type="button" aria-label="Perfil de usuario">
                        <svg class="profile-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M 12 14 A 7 7 0 0 0 5 21 H 19 A 7 7 0 0 0 12 14 Z"></path>
                        </svg>
                        <span>Perfil</span>
                    </button>
                </div>
            </div>

            <div class="header-panel" id="sitePanel">
                <nav class="nav-links" id="primaryNav" aria-label="Navegación principal">
                    <a href="/index.html">Inicio</a>
                    <a href="/index.html#movies">Películas</a>
                    <a href="/pages/genres.html">Géneros</a>
                    <a href="/pages/favorites.html" aria-current="page">Mi Lista</a>
                </nav>
                <label class="search-box">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="search" placeholder="Buscar en mi lista..." aria-label="Buscar en favoritos">
                </label>
            </div>
        </div>
    </header>

    <main class="page-main">
        <section class="favorites-hero">
            <div class="overlay"></div>
            <div class="banner-content favorites-banner">
                <p class="favorites-kicker">Mi Lista</p>
                <h1>Películas guardadas</h1>
                <p>Tu selección personal de clásicos y contenido favorito, guardado en este dispositivo.</p>
            </div>
        </section>

        <section class="movies-section favorites-section">
            <div class="container">
                <div class="section-header">
                    <h2>Favoritos</h2>
                    <p>Agrega o quita películas</p>
                </div>
                <div class="movies-carousel favorites-carousel" aria-label="Lista de favoritos">
                    <div id="favoritesGrid" class="movies-grid favorites-grid"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/favorites.js"></script>
</body>
</html>
